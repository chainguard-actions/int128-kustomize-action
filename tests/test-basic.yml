name: Test basic kustomize build
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          base-directory: ${{ github.workspace }}/actions/hardened/int128--kustomize-action/v1.182.0/tests/fixtures
      - name: Assert directory output is set
        env:
          DIRECTORY: ${{ steps.action.outputs.directory }}
        run: |
          echo "directory: $DIRECTORY"
          if [ -z "$DIRECTORY" ]; then
            echo "FAIL: expected directory output to be non-empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert files output is set
        env:
          FILES: ${{ steps.action.outputs.files }}
        run: |
          echo "files: $FILES"
          if [ -z "$FILES" ]; then
            echo "FAIL: expected files output to be non-empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert output directory exists and contains files
        env:
          DIRECTORY: ${{ steps.action.outputs.directory }}
        run: |
          echo "Checking directory: $DIRECTORY"
          if [ ! -d "$DIRECTORY" ]; then
            echo "FAIL: output directory does not exist: $DIRECTORY"
            exit 1
          fi
          count=$(find "$DIRECTORY" -type f | wc -l)
          echo "File count: $count"
          if [ "$count" -lt 1 ]; then
            echo "FAIL: expected at least one output file"
            exit 1
          fi
          echo "PASS"
