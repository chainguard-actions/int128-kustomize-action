name: Test multiple kustomizations with glob
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - id: kustomize
        uses: .
        with:
          kustomization: ${{ github.workspace }}/tests/fixtures/overlays/*/kustomization.yaml
          base-directory: ${{ github.workspace }}
          retry-max-attempts: '0'
          max-process: '2'

      - name: Assert directory output is set
        env:
          ACTUAL: ${{ steps.kustomize.outputs.directory }}
        run: |
          echo "directory: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected directory output to be non-empty"
            exit 1
          fi
          echo "PASS"

      - name: Assert files output contains multiple entries
        env:
          FILES: ${{ steps.kustomize.outputs.files }}
        run: |
          echo "files output:"
          echo "$FILES"
          COUNT=$(echo "$FILES" | grep -c '.' || true)
          echo "file count: $COUNT"
          if [ "$COUNT" -lt 2 ]; then
            echo "FAIL: expected at least 2 generated files, got $COUNT"
            exit 1
          fi
          echo "PASS"

      - name: Assert development overlay file exists
        env:
          FILES: ${{ steps.kustomize.outputs.files }}
        run: |
          echo "files: $FILES"
          DEV_FILE=$(echo "$FILES" | grep "development" | head -n1)
          echo "development file: $DEV_FILE"
          if [ -z "$DEV_FILE" ]; then
            echo "FAIL: no file found for development overlay"
            exit 1
          fi
          if [ ! -f "$DEV_FILE" ]; then
            echo "FAIL: development overlay file does not exist: $DEV_FILE"
            exit 1
          fi
          echo "PASS"

      - name: Assert production overlay file exists
        env:
          FILES: ${{ steps.kustomize.outputs.files }}
        run: |
          echo "files: $FILES"
          PROD_FILE=$(echo "$FILES" | grep "production" | head -n1)
          echo "production file: $PROD_FILE"
          if [ -z "$PROD_FILE" ]; then
            echo "FAIL: no file found for production overlay"
            exit 1
          fi
          if [ ! -f "$PROD_FILE" ]; then
            echo "FAIL: production overlay file does not exist: $PROD_FILE"
            exit 1
          fi
          echo "PASS"

      - name: Assert no raw-errors
        env:
          ACTUAL: ${{ steps.kustomize.outputs.raw-errors }}
        run: |
          echo "raw-errors: '$ACTUAL'"
          if [ -n "$ACTUAL" ]; then
            echo "FAIL: expected no errors but got: $ACTUAL"
            exit 1
          fi
          echo "PASS"
